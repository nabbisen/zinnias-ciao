name = "zinnias-ciao"
main = "workers/ssr/build/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Build via worker-build (Rust -> wasm32-unknown-unknown)
[build]
command = "worker-build --release workers/ssr"

# D1 database binding
[[d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao"
database_id   = "local"          # tracked template value; hosted IDs live in ignored wrangler*.local.toml

# KV namespace for rate-limiting (RFC-012)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "local"

# Secret bindings — set via `wrangler secret put` in each environment.
# Never hard-coded here.
#   HMAC_PEPPER           — server pepper for invite/session/form-token HMACs
#
# SESSION_COOKIE_DOMAIN is a normal [vars] binding (not secret — the domain is
# not sensitive). Set it per-environment below. Leave unset/empty for a
# host-only cookie (correct for a single-host deployment).

[vars]
BUILD_VERSION              = "dev"
LOG_LEVEL                  = "info"
COMMUNITY_CREATION_ENABLED = "false"

[env.dev]
name = "zinnias-ciao-ssr-dev"
[env.dev.vars]
BUILD_VERSION              = "dev"
LOG_LEVEL                  = "debug"
COMMUNITY_CREATION_ENABLED = "true"

[[env.dev.d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao-dev"
database_id   = "local"

[[env.dev.kv_namespaces]]
binding = "RATE_LIMIT"
id      = "local"

# Hosted staging uses the same config shape with real Cloudflare IDs in an
# ignored local copy:
#   cp wrangler.toml wrangler.staging.local.toml
#   git check-ignore -v wrangler.staging.local.toml
# Staging management docs:
#   docs/src/shared/deployment.md#staging-exposure
#   docs/src/shared/deployment.md#staging-teardown
#   docs/src/tester/staging-runtime-prototype.md#hosted-staging-smoke
# Then replace only the staging D1 database_id and RATE_LIMIT KV id below.
[env.staging]
name = "zinnias-ciao-ssr-stg"
[env.staging.vars]
LOG_LEVEL                  = "info"
BUILD_VERSION              = "staging"
COMMUNITY_CREATION_ENABLED = "true"

[[env.staging.d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao-staging"
database_id   = "REPLACE_WITH_STAGING_D1_ID"   # create with: wrangler d1 create zinnias-ciao-staging

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id      = "REPLACE_WITH_STAGING_KV_ID"         # create with: wrangler kv namespace create RATE_LIMIT --env staging

[env.production]
name = "zinnias-ciao-ssr-prd"
[env.production.vars]
LOG_LEVEL                  = "warn"
BUILD_VERSION              = "production"
COMMUNITY_CREATION_ENABLED = "false"

[[env.production.d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao"
database_id   = "REPLACE_WITH_PRODUCTION_D1_ID"   # create with: wrangler d1 create zinnias-ciao

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id      = "REPLACE_WITH_PRODUCTION_KV_ID"         # create with: wrangler kv namespace create RATE_LIMIT --env production
