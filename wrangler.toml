name = "zinnias-ciao"
main = "workers/ssr/build/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Build via worker-build (Rust -> wasm32-unknown-unknown)
[build]
command = "worker-build --release workers/ssr"

# D1 database binding
[[d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao"
database_id   = "local"          # replaced by real ID on deploy

# KV namespace for rate-limiting (RFC-012)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "local"

# Secret bindings — set via `wrangler secret put` in each environment.
# Never hard-coded here.
#   HMAC_PEPPER     — server pepper for invite-code and session HMAC (AD-3)
#   SESSION_COOKIE_DOMAIN

[vars]
BUILD_VERSION = "dev"
LOG_LEVEL     = "info"

[env.dev]
name = "zinnias-ciao-ssr-dev"
[env.dev.vars]
BUILD_VERSION = "dev"
LOG_LEVEL     = "debug"

[[env.dev.d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao-dev"
database_id   = "local"

[[env.dev.kv_namespaces]]
binding = "RATE_LIMIT"
id      = "local"

[env.production]
name = "zinnias-ciao-ssr-prd"
[env.production.vars]
LOG_LEVEL = "warn"
