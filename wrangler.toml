name = "zinnias-ciao"
main = "workers/ssr/build/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Build via worker-build (Rust -> wasm32-unknown-unknown)
[build]
command = "worker-build --release workers/ssr"

# D1 database binding
[[d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao"
database_id   = "local"          # replaced by real ID on deploy

# KV namespace for rate-limiting (RFC-012)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "local"

# codlet KV namespace for rate-limiting (RFC-033)
[[kv_namespaces]]
binding = "CODLET_RL"
id      = "local"

# Secret bindings — set via `wrangler secret put` in each environment.
# Never hard-coded here.
#   HMAC_PEPPER           — legacy server pepper (pre-codlet sessions, AD-3)
#   CODLET_HMAC_KEY_V1    — codlet HMAC key (generate: openssl rand -hex 32)
#
# SESSION_COOKIE_DOMAIN is a normal [vars] binding (not secret — the domain is
# not sensitive). Set it per-environment below. Leave unset/empty for a
# host-only cookie (correct for a single-host deployment).

[vars]
BUILD_VERSION = "dev"
LOG_LEVEL     = "info"

[env.dev]
name = "zinnias-ciao-ssr-dev"
[env.dev.vars]
BUILD_VERSION = "dev"
LOG_LEVEL     = "debug"

[[env.dev.d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao-dev"
database_id   = "local"

[[env.dev.kv_namespaces]]
binding = "RATE_LIMIT"
id      = "local"

[[env.dev.kv_namespaces]]
binding = "CODLET_RL"
id      = "local"

[env.staging]
name = "zinnias-ciao-ssr-stg"
[env.staging.vars]
LOG_LEVEL     = "info"
BUILD_VERSION = "staging"

[[env.staging.d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao-staging"
database_id   = "REPLACE_WITH_STAGING_D1_ID"   # create with: wrangler d1 create zinnias-ciao-staging

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id      = "REPLACE_WITH_STAGING_KV_ID"         # create with: wrangler kv:namespace create RATE_LIMIT --env staging

[[env.staging.kv_namespaces]]
binding = "CODLET_RL"
id      = "REPLACE_WITH_STAGING_CODLET_RL_ID"  # create with: wrangler kv:namespace create CODLET_RL --env staging

[env.production]
name = "zinnias-ciao-ssr-prd"
[env.production.vars]
LOG_LEVEL     = "warn"
BUILD_VERSION = "production"

[[env.production.d1_databases]]
binding       = "DB"
database_name = "zinnias-ciao"
database_id   = "REPLACE_WITH_PRODUCTION_D1_ID"   # create with: wrangler d1 create zinnias-ciao

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id      = "REPLACE_WITH_PRODUCTION_KV_ID"         # create with: wrangler kv:namespace create RATE_LIMIT --env production

[[env.production.kv_namespaces]]
binding = "CODLET_RL"
id      = "REPLACE_WITH_PRODUCTION_CODLET_RL_ID"  # create with: wrangler kv:namespace create CODLET_RL --env production
