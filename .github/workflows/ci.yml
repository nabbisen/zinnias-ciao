# ciao.zinnias CI — RFC-015 / RFC-016
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (domain + contracts)
        run: cargo clippy -p zinnias-ciao-domain -p zinnias-ciao-contracts -- -D warnings
      - name: Tests (domain + contracts)
        run: cargo test -p zinnias-ciao-domain -p zinnias-ciao-contracts

  check-wasm:
    name: Type-check (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check SSR worker
        run: cargo check -p zinnias-ciao-ssr --target wasm32-unknown-unknown

  migration-check:
    name: Migration syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate migrations
        run: |
          # Every file in migrations/ must exist and be non-empty.
          # Numbering must be sequential with no gaps.
          set -e
          files=$(ls migrations/*.sql | sort)
          count=0
          for f in $files; do
            test -s "$f" || (echo "EMPTY or missing: $f" && exit 1)
            count=$((count + 1))
          done
          echo "Migration files found: $count"
          # Verify sequential numbering (0001, 0002, ..., 000N)
          seq=1
          for f in $files; do
            base=$(basename "$f")
            num=$(echo "$base" | grep -oE '^[0-9]+')
            expected=$(printf "%04d" $seq)
            if [ "$num" != "$expected" ]; then
              echo "Gap or misnumbering: expected $expected, got $num in $base"
              exit 1
            fi
            seq=$((seq + 1))
          done
          echo "All $count migration files OK and sequentially numbered."
